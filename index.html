<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0b0f">
<title>THWAP</title>
<style>
  :root { --machine:#0b0b0f; --glass:#11131a; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:#050507; overflow:hidden; overscroll-behavior:none; }
  body { display:flex; align-items:center; justify-content:center;
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; color:#e8e8ee;
    touch-action:none; -webkit-user-select:none; user-select:none; }
  #wrap { position:relative; height:100%; aspect-ratio:9/19.5; max-width:100vw; background:var(--machine);
    box-shadow:0 0 0 1px #1c1e28, 0 30px 80px rgba(0,0,0,.6); overflow:hidden; }
  @media (max-aspect-ratio:9/19.5){ #wrap{ width:100vw; height:auto; aspect-ratio:9/19.5; } }
  canvas { display:block; width:100%; height:100%; touch-action:none; }
  .layer { position:absolute; inset:0; pointer-events:none; }
  .panel { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center;
    padding:24px; text-align:center; background:rgba(5,5,7,.86); backdrop-filter:blur(2px); pointer-events:auto; }
  .panel.on { display:flex; }
  .doc { width:100%; max-width:340px; background:#f3f0e7; color:#14140f; border-radius:6px; padding:18px 18px 16px;
    box-shadow:0 12px 40px rgba(0,0,0,.5); text-align:left; }
  .doc .rule { border-top:1px dashed #b9b4a4; margin:10px 0; }
  .doc h1 { font-size:19px; font-weight:700; letter-spacing:.01em; line-height:1.15; }
  .doc .sub { font-size:12px; color:#5b584c; margin-top:3px; line-height:1.5; }
  .doc .big { font-size:15px; font-weight:700; }
  .doc .dmg { color:#a3231f; font-weight:700; }
  .doc .ok { color:#166a3d; font-weight:700; }
  .ledger { font-size:11px; color:#5b584c; display:flex; justify-content:space-between; gap:6px; }
  .btns { display:flex; gap:10px; margin-top:16px; width:100%; max-width:340px; }
  .btn { flex:1; pointer-events:auto; cursor:pointer; border:none; border-radius:6px; padding:13px 10px;
    font-family:inherit; font-size:13px; font-weight:700; letter-spacing:.02em; }
  .btn.ghost { background:transparent; color:#c9c7cf; box-shadow:inset 0 0 0 1px #33313c; }
  .btn.hot { background:#e8e8ee; color:#101015; }
  .btn.wide { flex:none; width:100%; max-width:340px; margin-top:10px; }
  .hint { font-size:11px; color:#6b6976; margin-top:14px; max-width:300px; line-height:1.6; }
  #shareimg { width:100%; max-width:300px; border-radius:6px; margin-top:4px; box-shadow:0 8px 30px rgba(0,0,0,.5); }
  .kick { font-size:12px; letter-spacing:.22em; color:#8a8796; text-transform:uppercase; margin-bottom:8px; }
  .tag { position:absolute; top:10px; left:12px; font-size:10px; letter-spacing:.2em; color:#3f3d49; pointer-events:none; }
  a.raw { color:#8a8796; font-size:10px; word-break:break-all; text-decoration:none; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>
  <div class="tag">THWAP · machine no. 7 · season 1 · the observation continues</div>

  <div class="panel" id="p_fall">
    <div class="doc" id="fall_doc"></div>
    <div class="btns">
      <button class="btn ghost" id="b_takeL">TAKE THE FALL</button>
      <button class="btn hot" id="b_appeal">CALL A HAND</button>
    </div>
    <div class="hint">drop a friend into your exact last second — the grab you missed. one hand, one shot. reachable, or not?</div>
  </div>

  <div class="panel" id="p_share">
    <div class="kick">a hand, called</div>
    <img id="shareimg" alt="your fall, on the record">
    <button class="btn hot wide" id="b_copy">COPY THE CALL</button>
    <button class="btn ghost wide" id="b_back">back to the climb</button>
    <div class="hint" id="share_note">they get one shot at the grab you missed. send it.</div>
  </div>

  <div class="panel" id="p_appeal_intro">
    <div class="kick" id="ai_kick">incoming appeal</div>
    <div class="doc" id="ai_doc"></div>
    <button class="btn hot wide" id="b_watch">TAKE THE SHOT</button>
  </div>

  <button class="btn ghost" id="b_giveup" style="position:absolute; bottom:18px; left:50%; transform:translateX(-50%); width:auto; display:none; pointer-events:auto; font-size:11px; padding:9px 16px;">abandon · certify it unsurvivable</button>
  <button class="btn ghost" id="b_archive" style="position:absolute; bottom:16px; left:12px; width:auto; display:none; pointer-events:auto; font-size:10px; padding:8px 12px;">THE ARCHIVE</button>
  <button class="btn ghost" id="b_foyer" style="position:absolute; bottom:16px; right:12px; width:auto; display:none; pointer-events:auto; font-size:10px; padding:8px 12px;">THE MACHINE</button>

  <div class="panel" id="p_foyer">
    <div class="doc" id="foyer_doc" style="max-height:72vh; overflow-y:auto;"></div>
    <button class="btn ghost wide" id="b_foyclose">back to the climb</button>
  </div>

  <div class="panel" id="p_record">
    <div class="doc" id="record_doc" style="max-height:72vh; overflow-y:auto;"></div>
    <button class="btn ghost wide" id="b_recclose">back to the climb</button>
  </div>

  <div class="panel" id="p_win">
    <div class="doc" id="win_doc"></div>
    <button class="btn hot wide" id="b_winshare">COPY THE PROOF</button>
    <button class="btn ghost wide" id="b_wincont">return to the pit</button>
  </div>

  <div class="panel" id="p_verdict">
    <div class="doc" id="verdict_doc"></div>
    <button class="btn hot wide" id="b_reply">SEND THE VERDICT</button>
    <button class="btn ghost wide" id="b_climb">start your own tower</button>
  </div>
</div>

<script>
"use strict";
/* ============================================================ THWAP
   one-button claw-machine climber · phone-first · deterministic world
   HOLD to wind a stud · RELEASE to fling · TAP mid-air to grab
   ============================================================ */

/* ---------- deterministic PRNG (fixed seed → identical tower on every device) ---------- */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

/* ---------- fixed virtual world (units, NOT pixels) ---------- */
const VW = 430;              // world width in units
const CX = VW/2;
const G  = 2000;             // gravity (units/s^2)
const DT = 1/120;            // fixed sim step
const REACH = 112;           // grab reach ring radius — small enough that aim is real
const AIM_BEND = 1.45;       // how hard a mistimed release bends the launch off vertical
const COYOTE = 0.08;         // 80ms grab forgiveness
const HITSTOP = 0.07;        // 70ms freeze on grab
const WIND_TIME = 0.85;      // seconds to full charge
const W0 = 5, WMAX = 11;     // angular velocity range (rad/s) — spin is a charge tell, not an aim gate
const WRAP_CAP = 3;          // hard greed cap (wraps) → auto-release
const R0 = 42, RMIN = 34;    // orbit radius (wound in as you charge)
const LAUNCH_MIN = 720, LAUNCH_MAX = 1260;
const PLUSH_RIP = 1.5;       // plush lets go after 1.5s
const CLAW_PERIOD = 3.0;     // claw opens every 3s
const CLAW_OPEN = 0.55;
const NAMED_FALL_PCT = 11;   // % drop that earns a named catastrophe
const PIT_Y = 150;           // plush pit floor
const TOP_Y = 6150;          // the chute
const TOWER_H = TOP_Y - PIT_Y;

/* ---------- copy pools (system voice: deadpan court; never slang; roasts the decision) ---------- */
const HANDLES = ["DARNELL","MAYA","THE OPP","DEVON","PRIYA","MASON","JAYDEN","AVA","ZOE","DEX","THE DEFENDANT",
  "NO. 7","MARCUS","SAM","THE ACCUSED","YOUR HONOR","EXHIBIT A","THE PLAINTIFF","WASHED","THE JURY","GREGORY"];
const ZONES = [
  {top:8,  name:"the pit"},
  {top:30, name:"the spill"},
  {top:55, name:"the reef"},
  {top:75, name:"the gallery"},
  {top:92, name:"claw country"},
  {top:101,name:"the cornice"},
];
const SEASON = { id:1, name:"SEASON 1" };
const FALL_NAMES = [
  "THE OPTIMIST","THE LONG GOODBYE","THE NEGOTIATION","THE SECOND OPINION",
  "THE COMMITMENT","THE ENCORE","THE VICTORY LAP","THE SABBATICAL",
  "THE UNDERSTUDY","THE FAREWELL TOUR","THE INVESTMENT","THE HOMECOMING",
  "THE DOUBLE DOWN","THE EARLY RETIREMENT","THE LEASE","THE FORECAST",
];
const FINDINGS = {
  greed: [
    "The rubber trembled. The rubber squeaked. The subject wound once more. This behavior has been documented before. It has never worked.",
    "A third wrap was attempted. The third wrap is not a secret. It is a countdown.",
  ],
  rip: [
    "The plush held for its full 1.5 seconds. The subject requested more. The plush declined, as plush do.",
    "A hold that outlasted the fauna's attention span. The fauna noticed nothing.",
  ],
  manual: [
    "The survivable release is marked. The subject is visible in the footage, not taking it.",
    "A hold that outlasted its usefulness. The stud was not consulted.",
  ],
};
const CEREMONY_LINE = "The fall is not unusual. What is unusual is that it will try again.";
const FIELD_NOTES = [
  "The claw is scheduled the way rain is scheduled. You do not argue with it. You count.",
  "Plastic holds forever, asks nothing, remembers no one.",
  "The plush have noticed nothing. The plush never do.",
  "Release early. It feels wrong every time. It is right every time.",
  "The pit is not the bottom. The plush call it the foyer.",

// Moose's notes, scratched up the whole machine over years — his voice is everywhere you climb.
// they get sparser and older the higher you go (see the fade in render).
const CARVINGS = [
  {pct:6,    x:64,     t:"HANDS UP, KID. — M"},
  {pct:13,   x:VW-150, t:"IF YOU CAN READ THIS YOU'RE ALREADY BRAVER THAN ME AT YOUR AGE"},
  {pct:19,   x:70,     t:"THE PINK ONES LET GO. don't fall in love with a soft thing."},
  {pct:27,   x:VW-140, t:"count the claw. one. two. then you go."},
  {pct:34,   x:66,     t:"i named it Gerald. it's less scary with a name. barely."},
  {pct:42,   x:VW-120, t:"the glass isn't a window, kid. i know it looks like one."},
  {pct:50,   x:VW-150, t:"the sign out there says EVERYBODY GOES HOME. i'm keeping it honest up here."},
  {pct:58,   x:72,     t:"i keep your eye where i can see it. the other one, i mean. keep mine."},
  {pct:66,   x:VW-118, t:"release EARLY. earlier than that. i mean it, you stubborn thumb."},
  {pct:74,   x:74,     t:"got higher today than yesterday. told nobody. told this stud."},
  {pct:83,   x:VW-110, t:"if you made it this far you didn't need the notes. keep them anyway."},
  {pct:91,   x:70,     t:"this is where Palmer's grip ran out. good hand. tell him i said so."},
];
// the pit remembers Moose. these play, quietly, while you rest at the bottom.
const PIT_CHORUS = [
  {who:'GLORIA', t:"Land on me, baby. Moose used to, back when he still came down."},
  {who:'GLORIA', t:"He caught more of us than the claw ever did. Nobody puts THAT on a sign."},
  {who:'PALMER', t:"Eighty-nine percent. That was me. Moose went higher and stayed. Don't ask me which is worse."},
  {who:'PALMER', t:"He taught you to count the claw so the fear had somewhere to go. Still counting? Good."},
  {who:'THE COLONEL', t:"I kept a tally of every toy that claw took. I stopped counting the day it took him."},
  {who:'NANA', t:"When it comes down, hold something. Moose told me that. I've held this ear ever since."},
  {who:'KING', t:"He made it OUT, I'm telling you. Through the top. He's in a better machine now."},
  {who:'THE COLONEL', t:"You've got his release. Bad temper, too, but mostly the release."},
  {who:'GLORIA', t:"You slept in the crook of his arm. You were the size of a thumb. You don't remember. He did."},
  {who:'PALMER', t:"Nobody's climbed like you since him. Nobody. I'd know — I watch the whole thing."},
];
const TOKEN_R = 44;
// (pit furnishings deleted — cosmetics now only change the machine you climb through)
// hand finishes: each is a full identity — body, eyes, glow, motion trail, grab-impact color
const FINISHES = {
  factory: { name:'FACTORY RED', cost:0, body:'#e85c3c', body2:'#b23a1e', eye:'googly', trail:null, glow:null,
    line:'as manufactured. honest.' },
  midnight:{ name:'MIDNIGHT', cost:25, body:'#3b447a', body2:'#1c2140', eye:'glint', trail:'stars', trailCol:'#cdd6ff', glow:null,
    line:'for climbing when you would rather not be seen doing it.' },
  banana:  { name:'BANANA', cost:25, body:'#ecc24a', body2:'#b98a1f', eye:'cyclops', trail:null, glow:null,
    line:'one eye, entirely committed. the machine will mistake you for stock. briefly.' },
  ghost:   { name:'GHOST', cost:40, body:'rgba(208,214,230,0.42)', body2:null, eye:'hollow', trail:'after', trailCol:'rgba(208,214,230,0.5)', glow:null,
    line:'translucent, and leaves itself behind. the glass approves. the glass has never approved of anything.' },
  ember:   { name:'EMBER', cost:45, body:'#ff6a2a', body2:'#b8300f', eye:'googly', trail:'fire', trailCol:'#ff7a33', glow:'#ff5a1e',
    line:'burns a trace all the way down. the record approves of nothing, and it approves of this.' },
  gilded:  { name:'GILDED', cost:80, body:'#f0cf62', body2:'#a6791d', eye:'rimmed', rim:'#8a6510', trail:'sparkle', trailCol:'#ffe9a0', glow:'#e7c04b',
    line:'the claw has excellent taste. climb accordingly.' },
  chrome:  { name:"THE OPERATOR'S OWN", cost:120, body:'#e2e8ef', body2:'#5b6470', metal:true, eye:'rimmed', rim:'#7d8894', trail:'after', trailCol:'rgba(226,232,239,0.55)', glow:'#f0f5fb',
    line:"the operator's own hand, borrowed. it still remembers the last commandment. so, now, do you." },
};
const GUIDE_DEFS = {
  dead:   {name:'THE DEAD RELEASE', better:'lower', unit:'ms',
    riddle:'concerns: the two instants per revolution when the machine cannot tell left from right.',
    stamp:'released at dead vertical. the machine checked the angle twice. there was no angle.'},
  wrap:   {name:'THE THIRD WRAP', better:'lower', unit:'ms',
    riddle:'concerns: property released moments before repossession.',
    stamp:'filed {m}ms before the cap. the cap was already reaching.'},
  snipe:  {name:'THE RIP SNIPE', better:'lower', unit:'ms',
    riddle:'concerns: leaving a soft thing precisely before it leaves you.',
    stamp:'left the plush {m}ms before it left you.'},
  cushion:{name:'THE CUSHION', better:'lower', unit:'%',
    riddle:'concerns: falls that never made the record, and why the record resents them.',
    stamp:'drop trimmed to {m}%. nothing will be named today. the record is disappointed.'},
  skip:   {name:'THE SKIP', better:'higher', unit:'u',
    riddle:'concerns: a rung that was, on review, found unnecessary.',
    stamp:'two rungs, one fling. the stud in between has been notified.'},
};
const CASES = [
  { id:'elder', title:'RECONSTRUCTION №1 — THE ELDER', from:'THE ELDER',
    sub:'Season 1, day 3. Survived by nothing, ever.',
    f:{n:'FALL №1', p:79, a:91, b:12, w:3},
    t:[[215,5610],[180,5300],[240,4900],[170,4500],[230,4100],[250,3300],[270,2450]],
    s0:[270,2450,-180,-900] },
  { id:'lullaby', title:'RECONSTRUCTION №2 — THE LULLABY', from:'PALMER',
    sub:'Season 1. A retired hand. The plush sang, allegedly.',
    f:{n:'FALL №2', p:58, a:71, b:13, w:2},
    t:[[200,4400],[260,4300],[320,4180],[330,4050]],
    s0:[330,4050,-260,-900] },
  { id:'wedding', title:'RECONSTRUCTION №3 — THE WEDDING', from:'DUCHESS',
    sub:'Season 1. From the cornice. Nobody speaks of the reception.',
    f:{n:'FALL №3', p:88, a:96, b:8, w:3},
    t:[[215,5900],[170,5750],[120,5600],[80,5480],[60,5400]],
    s0:[60,5400,-260,-900] },
];
function casePayload(c){ return {v:1,k:'A',archive:true,caseId:c.id,from:c.from,sn:1,f:c.f,t:c.t,s0:c.s0.slice(),L:{vs:null,c:0,g:0,d:0,dmg:0}}; }
function footagePayload(e){ return {v:1,k:'A',self:true,no:e.no,from:myHandle,sn:SEASON.id,
  f:{n:'FALL №'+e.no+' — '+e.name, p:e.pct, a:e.from, b:Math.max(0,e.from-e.pct), w:0},
  t:e.t, s0:e.s0.slice(), L:{vs:null,c:0,g:0,d:0,dmg:0}}; }

/* ---------- canvas / DPR ---------- */
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
let Wc=0, Hc=0, S=1, DPR=1;
function resize(){
  const r = cv.getBoundingClientRect();
  DPR = Math.min(window.devicePixelRatio||1, 2.5);
  Wc = r.width; Hc = r.height;
  cv.width = Math.round(Wc*DPR); cv.height = Math.round(Hc*DPR);
  S = Wc / VW;                         // world→screen scale
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
new ResizeObserver(resize).observe(cv);
addEventListener('resize', resize);

/* world→screen */
let camY = 0;
function sx(x){ return x*S; }
function sy(y){ return Hc*0.62 - (y - camY)*S; }   // hero sits ~62% down the screen

/* ---------- tower ---------- */
let STUDS = [];
function zoneAt(pct){ for(const z of ZONES){ if(pct < z.top) return z; } return ZONES[ZONES.length-1]; }
function buildTower(){
  STUDS = [];
  const rnd = mulberry32(70707);      // FIXED seed → same tower everywhere
  // plush pit: a soft floor that catches any fall — these NEVER rip, so you can rest at the bottom
  for(let i=0;i<6;i++) STUDS.push({x:56+i*64, y:PIT_Y - 8 + (i%2)*12, type:'plush', pit:true});
  // the starting perch: a stable plastic block you spawn on; wind from it at your own pace, no pressure
  STUDS.push({x:CX, y:PIT_Y+40, type:'plastic', perch:true});
  // gentle on-ramp: a centered plastic ladder. the first hops are gimmes; the machine turns mean higher up
  STUDS.push({x:CX,    y:PIT_Y+175, type:'plastic'});
  STUDS.push({x:CX-38, y:PIT_Y+345, type:'plastic'});
  STUDS.push({x:CX+44, y:PIT_Y+520, type:'plastic'});
  STUDS.push({x:CX-28, y:PIT_Y+700, type:'plastic'});
  let y = PIT_Y + 890;
  let side = 1;
  while(y < TOP_Y - 240){
    const pct = (y-PIT_Y)/TOWER_H*100;
    const z = zoneAt(pct);
    // horizontal placement zig-zags; gap grows a touch with height
    const spread = 96 + rnd()*54 + (pct>55?26:0);
    const x = CX + side*spread*(0.35+rnd()*0.65);
    let type='plastic';
    if(z.name==='the pit') type='plush';
    else if(z.name==='the gallery'){ type = rnd()<0.52 ? 'glass' : 'plastic'; }
    else if(z.name==='claw country'){ type = rnd()<0.28 ? 'glass' : 'plastic'; }
    else if(z.name==='the spill'){ type = rnd()<0.25 ? 'plush':'plastic'; }
    STUDS.push({x:Math.max(48,Math.min(VW-48,x)), y, type});
    // helper studs thin out with altitude — the upper machine stops being polite
    if(rnd() < (pct>55 ? 0.26 : 0.42)){ STUDS.push({x:Math.max(48,Math.min(VW-48,CX - side*spread*0.7)), y:y+70+rnd()*40,
      type: (z.name==='the gallery'&&rnd()<0.42)?'glass':'plastic'}); }
    let gap = 226 + rnd()*104;
    if(pct>55) gap += 30 + rnd()*26;
    if(pct>80) gap += 26 + rnd()*24;
    y += gap;
    side *= -1;
  }
  // the claw: a grabbable bar near the chute
  CLAW = {x:CX, y:TOP_Y-960, w:120, phase:0};
  STUDS.push({x:CX, y:TOP_Y-20, type:'plastic', chute:true});
  // service pass: the machine is hostile, never impossible — rivet in plastic where no route exists
  const APEX=397; let safety=0;
  while(safety++<60){
    const g = STUDS.filter(grippable).sort((a,b)=>a.y-b.y);
    let wall=null;
    for(const s of g){ if(s.y>TOP_Y-260) continue;
      let best=1e9;
      for(const t of g){ const dy=t.y-s.y; if(dy<40) continue;
        if(Math.abs(t.x-s.x)>240) continue;
        const need=dy-REACH; if(need<best) best=need; }
      if(best>APEX){ wall=s; break; } }
    if(!wall) break;
    STUDS.push({x:Math.max(48,Math.min(VW-48, wall.x + (wall.x<CX?90:-90))),
      y:wall.y+APEX+REACH-90, type:'plastic'});
  }
  // quarters, wedged in the machine since Season 0 — fixed spots, richer with altitude
  TOKENS = [];
  const r2 = mulberry32(40404);
  let ty = PIT_Y + 320;
  while(ty < TOP_Y - 220){
    const pq = (ty-PIT_Y)/TOWER_H*100;
    TOKENS.push({x:60+r2()*(VW-120), y:ty+r2()*80, v: pq<30?1: pq<55?2: pq<80?3:5, got:false});
    ty += 300 + r2()*260;
  }
  TOKENS.push({x:CX-40,y:TOP_Y-260,v:5,got:false},{x:CX+55,y:TOP_Y-190,v:5,got:false});
}
function resetTokens(){ for(const t of TOKENS) t.got=false; }
let CLAW=null;

/* ---------- game state ---------- */
const HAND = {
  mode:'attach',            // 'attach' | 'fly'
  x:CX, y:PIT_Y, vx:0, vy:0,
  anchor:null, ang:0, r:R0, w:W0, spin:1, charge:0, wraps:0, plush:0,
  peakY:PIT_Y,              // highest established point since last safe grab
};
let simFrame=0, hitstop=0, slowmo=0, flash=0, clawT=0;
let held=false, grabWin=0, whiffLock=0, grabLock=0;
let bestPct = 0, dusty=false, beaten=false, fallCount=0, bestFall=0, hasFlung=false;
let guide = {dead:{n:0,pb:null},wrap:{n:0,pb:null},snipe:{n:0,pb:null},cushion:{n:0,pb:null},skip:{n:0,pb:null}};
let fallLog = [], pendingStamp = null, bestTime = null, runStart = null, archStatus = {};
let quarters = 0, finishes = [], skin = 'factory', pickups = [], pitLands = 0, trail = [], bursts = [];
let TOKENS = [];
let zonesReached = [], audienceN = 0, chaptersRead = [];
// the story is found ONE NOTE PER CLIMB, in order. reaching high gets you the next note, not all of them.

/* ---------- helpers ---------- */
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const pctOf=y=>clamp((y-PIT_Y)/TOWER_H*100,0,100);
function grippable(s){ return s.type!=='glass'; }
function nearestStud(x,y,rad){
  let best=null, bd=rad*rad;
  for(const s of STUDS){ if(!grippable(s)) continue;
    const dx=s.x-x, dy=s.y-y, d=dx*dx+dy*dy;
    if(d<bd){ bd=d; best=s; } }
  return best;
}

/* ---------- attach / fling ---------- */
function attachTo(s, incomingVx, incomingVy){
  HAND.mode='attach'; HAND.anchor=s;
  HAND.r = clamp(Math.hypot(HAND.x-s.x, HAND.y-s.y), RMIN, R0);
  HAND.ang = Math.atan2(HAND.y-s.y, HAND.x-s.x);
  // spin direction inherits sideways momentum so the flow feels continuous
  const tang = (-Math.sin(HAND.ang))*incomingVx + (Math.cos(HAND.ang))*incomingVy;
  HAND.spin = tang>=0 ? 1 : -1;
  HAND.w=W0; HAND.charge=0; HAND.wraps=0; HAND.plush = (s.type==='plush' && !s.pit) ? 0 : -1;
  hitstop = HITSTOP; flash = 1;
  // establish a new "high water mark" for fall accounting when we grab higher
  if(s.y > HAND.peakY - 4) HAND.peakY = Math.max(HAND.peakY, s.y);
}
function recordMotion(key, margin){
  const def = GUIDE_DEFS[key], g = guide[key];
  const val = Math.round(margin*10)/10;
  g.n++;
  const isFirst = g.n===1;
  const isPB = g.pb===null || (def.better==='lower' ? val<g.pb : val>g.pb);
  if(isPB) g.pb = val;
  if(isFirst){ pendingStamp = def.name+' — '+def.stamp.replace('{m}', val); }
  else if(isPB){ pendingStamp = def.name+' — new margin: '+val+def.unit+'.'; }
  save();
}
function fling(reason){
  HAND.lastCause = reason||'manual'; hasFlung = true;
  // field-guide release motions (detection only, play mode, manual releases)
  if(mode==='play' && reason==='manual' && HAND.anchor){
    const side = Math.abs(Math.cos(HAND.ang));
    if(side<=0.12 && HAND.charge>=0.92) recordMotion('dead', side/HAND.w*1000);
    if(HAND.wraps>=2.7 && HAND.wraps<3) recordMotion('wrap', (3-HAND.wraps)*2*Math.PI/HAND.w*1000);
    if(HAND.plush>=1.25 && HAND.plush<1.5 && HAND.charge>=0.9) recordMotion('snipe', (1.5-HAND.plush)*1000);
  }
  const c = HAND.charge;
  let spd = LAUNCH_MIN + (LAUNCH_MAX-LAUNCH_MIN)*c;
  // launch is ALWAYS up (climbing is about power, not phase-timing a tangent);
  // the side the hand is on when you let go steers left/right on a wide, readable window.
  const side = Math.cos(HAND.ang);           // -1..1: release phase — this IS the aim
  // launch = up, bent by release phase. release at dead vertical → clean flight;
  // release badly → up to ~46° of your power goes sideways. bigger spin = harder timing.
  let dx = clamp(side,-1,1)*AIM_BEND, dy = 1.0;
  if(reason==='greed'){                      // the cap popped you: weak, flat, deserved
    dx = (side>=0?1:-1)*1.8; dy = 0.25; spd *= 0.65;
  }
  const inv = 1/Math.hypot(dx,dy);
  HAND.vx = dx*inv*spd; HAND.vy = dy*inv*spd;
  HAND.lastAnchor = HAND.anchor; HAND.lastWraps = HAND.wraps; HAND.lastSide = side;
  HAND.anchor=null; HAND.mode='fly'; grabLock = 0.16;   // clear the launch stud before re-grabbing
}

/* ---------- named fall detection ---------- */
function beginFallTrack(){
  fallTrack = { pts:[], fromY:HAND.peakY, fromPct:pctOf(HAND.peakY), lastSave:null, t:0 };
}
function endFallAtLanding(landY){
  const dropPct = pctOf(HAND.peakY) - pctOf(landY);
  if(dropPct >= NAMED_FALL_PCT && fallTrack){
    const z = zoneAt(fallTrack.fromPct);
    fallCount++;
    const cause = HAND.lastCause==='greed'||HAND.lastCause==='rip' ? HAND.lastCause : 'manual';
    const pool = FINDINGS[cause];
    const ceremony = fallCount<=3 || dropPct>bestFall;
    if(dropPct>bestFall) bestFall = Math.round(dropPct);
    currentFall = {
      zone:z, no:fallCount, name:FALL_NAMES[(fallCount-1)%FALL_NAMES.length], pct:Math.round(dropPct),
      fromPct:Math.round(fallTrack.fromPct), toPct:Math.round(pctOf(landY)),
      wraps: HAND.lastWraps||0, ceremony:ceremony,
      pts: fallTrack.pts.slice(-46),
      s0: fallTrack.lastSave,
      line: pool[(fallCount + (HAND.lastWraps||0)) % pool.length],

    const fs0 = fallTrack.lastSave;
    fallLog.push({no:currentFall.no, name:currentFall.name, pct:currentFall.pct, from:currentFall.fromPct,

      s0: fs0 ? [Math.round(fs0.x),Math.round(fs0.y),Math.round(fs0.vx),Math.round(fs0.vy)] : null,
      t: currentFall.pts.map(p=>[Math.round(p.x),Math.round(p.y)]) });
    save();
    openFallScreen();
  }
  HAND.peakY = landY;         // reset high-water mark to where we landed
  fallTrack = null;
}

/* ---------- sim ---------- */
function step(dt){
  simFrame++;
  clawT = (clawT + dt) % CLAW_PERIOD;
  const clawOpen = clawT > (CLAW_PERIOD - CLAW_OPEN);

  if(HAND.mode==='attach'){
    const s = HAND.anchor;
    // plush timer
    if(HAND.plush>=0){ HAND.plush += dt; if(HAND.plush > PLUSH_RIP){ /* rips loose */ HAND.charge*=0.4; fling('rip'); return; } }
    if(held){
      HAND.charge = clamp(HAND.charge + dt/WIND_TIME, 0, 1);
      HAND.w = W0 + (WMAX-W0)*HAND.charge;
      HAND.r = R0 - (R0-RMIN)*HAND.charge;
      const dAng = HAND.w*dt*HAND.spin;
      HAND.ang += dAng; HAND.wraps += Math.abs(dAng)/(Math.PI*2);
      if(HAND.wraps >= WRAP_CAP){ fling('greed'); return; }
    }
    HAND.x = s.x + Math.cos(HAND.ang)*HAND.r;
    HAND.y = s.y + Math.sin(HAND.ang)*HAND.r;
  } else {
    // FLYING
    HAND.vy -= G*dt;
    HAND.x += HAND.vx*dt; HAND.y += HAND.vy*dt;
    if(HAND.x<28){HAND.x=28; HAND.vx=Math.abs(HAND.vx)*0.5;}
    if(HAND.x>VW-28){HAND.x=VW-28; HAND.vx=-Math.abs(HAND.vx)*0.5;}

    // falling? start/continue tracking a potential catastrophe
    const falling = HAND.vy < 0;
    if(falling){
      if(!fallTrack && HAND.y < HAND.peakY - 40) beginFallTrack();
      if(fallTrack){
        fallTrack.t += dt;
        if(fallTrack.pts.length<200 && (simFrame%4===0)) fallTrack.pts.push({x:Math.round(HAND.x),y:Math.round(HAND.y)});
        // remember the last instant a save was live (a grippable stud in reach)
        const live = nearestStud(HAND.x, HAND.y, REACH);
        if(live) fallTrack.lastSave = {x:HAND.x, y:HAND.y, vx:HAND.vx, vy:HAND.vy};
      }
    }

    // grab attempt: one timed window per tap; a whiff recoils the hand before it can try again
    if(grabLock>0) grabLock -= dt;
    if(whiffLock>0) whiffLock -= dt;
    if(grabWin>0){
      grabWin -= dt;
      const s = nearestStud(HAND.x, HAND.y, REACH);
      if(!s && grabWin<=0){ whiffLock = 0.24; }
      if(s){
        const wasFalling = HAND.vy < -650 && fallTrack;
        const dropSoFar = fallTrack ? (pctOf(HAND.peakY)-pctOf(HAND.y)) : 0;
        attachTo(s, HAND.vx, HAND.vy);
        grabWin=0; whiffLock=0;
        bursts.push({x:s.x, y:s.y, f:simFrame, col:(FINISHES[skin]&&(FINISHES[skin].glow||FINISHES[skin].body))||'#fff'});
        if(wasFalling && dropSoFar>6){ slowmo=0.4; bossFlash(BARKS[simFrame%BARKS.length], true); }   // clutch save: the host loses it
        if(mode==='play'){
          if(fallTrack && dropSoFar>=8 && dropSoFar<11) recordMotion('cushion', 11-dropSoFar);
          if(HAND.lastAnchor && (s.y-HAND.lastAnchor.y)>=340) recordMotion('skip', Math.round(s.y-HAND.lastAnchor.y));
          if(pendingStamp){ bossFlash(pendingStamp); bossLineT=2.2; pendingStamp=null; }
        }
        if(s.chute && mode==='play'){ openWinScreen(); }                     // reached the top → win
        return;
      }
    }

    // hit the plush pit → auto-catch (zero-friction respawn), adjudicate the fall
    if(HAND.y <= PIT_Y + 24){
      const landY = PIT_Y + 30;
      HAND.y = landY; HAND.vx=0; HAND.vy=0;
      // land already gripping a pit stud
      let pit = STUDS.find(s=>s.perch) || STUDS.find(s=>s.pit) || {x:HAND.x,y:landY,type:'plastic',perch:true};
      const droppedFrom = HAND.peakY;
      endFallAtLanding(landY);
      if(mode==='play' || mode==='appeal_play'){
        attachTo(pit, 0, 0); held=false; HAND.charge=0;
        HAND.peakY = landY;
        if(mode==='play'){
          resetTokens(); pitLands++; zonesThisRun=[]; foundThisRun=false;
          // (no mercy unlocks — falling is not how you earn the story. only altitude is.)
        }
      }
    }
  }

  // quarters: collected by passing them — climbing is the only way to earn
  if(mode==='play'){
    for(const t of TOKENS){
      if(t.got) continue;
      const dx=t.x-HAND.x, dy=t.y-HAND.y;
      if(dx*dx+dy*dy < TOKEN_R*TOKEN_R){
        t.got=true; quarters+=t.v; save();
        pickups.push({x:t.x, y:t.y, v:t.v, f:simFrame});
      }
    }
  }
  const _fin = FINISHES[skin];
  if(_fin && _fin.trail && HAND.mode==='fly' && (simFrame%2===0)){
    trail.push({x:HAND.x,y:HAND.y}); if(trail.length>16) trail.shift();
  }

  // track best % + the return-migration clock (armed while resting in the pit)
  const p = pctOf(HAND.y);
  if(p<2 && HAND.mode==='attach') runStart = simFrame;
  // ONE note per climb. reach the zone the next note is in, and you find it — then that's your lot until you climb again.
  if(mode==='play' && !foundThisRun && storyIdx < CHAPTER_ORDER.length){
    const nextZone = CHAPTER_ORDER[storyIdx];
    const found = nextZone==='the chute' ? (p>=99.5) : (zoneAt(p).name===nextZone);
    if(found && STORY.chapters[nextZone]){
      storyIdx++; foundThisRun=true; save(); updateFoyerBadge();
      const ch=STORY.chapters[nextZone];
      reveal={title:'A NOTE — '+ch.title, lede:ch.lede||ch.title, t:0};
    }
  }
  if(p>bestPct){ bestPct=p; }
  if(p>=99.5 && mode==='play'){ openWinScreen(); return; }   // reached the summit
  // camera
  const targetCam = HAND.y + 60;
  camY += (targetCam - camY) * Math.min(1, dt*6.5);
}

function bossFlash(t, big){ bossLine=t; bossLineT=1.1; bossBig=!!big; }

/* ---------- input ---------- */
function down(){
  if(mode!=='play' && mode!=='appeal_play') return;
  held=true;
  if(mode==='appeal_play'){                      // reconstructions: ONE grab per attempt, timed
    if(takeover && !takeover.saved && takeover.window<=0){ takeover.window = 0.12; }
    return;
  }
  // the climb: a tap is ONE timed grab attempt; taps while recoiling or mid-launch are ignored
  if(HAND.mode==='fly' && whiffLock<=0 && grabLock<=0 && grabWin<=0){ grabWin = 0.15; }
}
function up(){
  held=false;
  if((mode==='play'||mode==='appeal_play') && HAND.mode==='attach') fling('manual');
}
cv.addEventListener('pointerdown', e=>{ e.preventDefault(); down(); }, {passive:false});
addEventListener('pointerup', e=>{ up(); });
addEventListener('pointercancel', e=>{ up(); });
addEventListener('keydown', e=>{ if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); if(!e.repeat) down(); }});
addEventListener('keyup', e=>{ if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); up(); }});

/* ============================================================ RENDER */
function hexA(hex, a){
  const h = hex.replace('#',''); const n = parseInt(h.length===3 ? h.split('').map(c=>c+c).join('') : h, 16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}
function themeStuds(){ const t=STUDSETS[studWorn]; return (t && t.studs) || null; }
function themeBG(){
  const t=BACKDROPS[bgWorn];
  if(!t || !t.zones) return {top:'#12141c', bottom:'#0a0b10', motif:'none'};
  const zp = clamp((camY-PIT_Y)/TOWER_H*100, 0, 100);
  const zn = zoneAt(zp).name;
  return t.zones.find(z=>z.zone===zn) || {top:'#12141c', bottom:'#0a0b10', motif:'none'};
}
function studPath(X, Y, r, shape){
  ctx.beginPath();
  if(shape==='gem'){ ctx.moveTo(X,Y-r); ctx.lineTo(X+r,Y); ctx.lineTo(X,Y+r); ctx.lineTo(X-r,Y); ctx.closePath(); }
  else if(shape==='square'){ ctx.rect(X-r*0.85, Y-r*0.85, r*1.7, r*1.7); }
  else if(shape==='bolt'){ ctx.moveTo(X,Y-r); ctx.lineTo(X+r*0.9,Y+r*0.5); ctx.lineTo(X-r*0.9,Y+r*0.5); ctx.closePath(); }
  else { ctx.arc(X,Y,r,0,7); }
}
function drawStud(s){
  const X=sx(s.x), Y=sy(s.y);
  if(Y<-30||Y>Hc+30) return;
  const th = themeStuds();
  const shape = th ? th.shape : 'round';
  ctx.save();
  if(s.type==='glass'){
    const g = th ? th.glass : '#78aad2';
    ctx.fillStyle=hexA(g,.16); ctx.strokeStyle=hexA(g,.5); ctx.lineWidth=1.5;
    studPath(X,Y,8*S+3,shape); ctx.fill(); ctx.stroke();
  } else if(s.type==='plush'){
    ctx.fillStyle= th ? th.plush : '#c8677e';
    ctx.beginPath(); ctx.arc(X,Y,9*S+2,0,7); ctx.fill();          // plush is always soft and round
    ctx.fillStyle='rgba(255,255,255,.15)'; ctx.beginPath(); ctx.arc(X-2,Y-2,3*S,0,7); ctx.fill();
  } else {
    ctx.fillStyle= s.chute? '#e7c04b' : (th ? th.plastic : '#8b8f9e');
    studPath(X,Y,7*S+2,shape); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.35)'; ctx.lineWidth=1.5; ctx.stroke();
  }
  ctx.restore();
}
function drawMotif(kind){
  if(!kind || kind==='none') return;
  ctx.save(); ctx.globalAlpha=0.13;
  const y0=Math.floor((camY-500)/160)*160;
  for(let wy=y0; wy<camY+900; wy+=160){
    const h=Math.abs((wy*2654435761)%997);
    const X=sx(30+(h%370)), Y=sy(wy);
    if(Y<-20||Y>Hc+20) continue;
    if(kind==='stars'){ ctx.fillStyle='#e8e8ee'; ctx.fillRect(X,Y,2,2); }
    else if(kind==='bubbles'){ ctx.strokeStyle='#e8e8ee'; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(X,Y,3+(h%4),0,7); ctx.stroke(); }
    else if(kind==='snow'){ ctx.fillStyle='#e8e8ee'; ctx.beginPath(); ctx.arc(X,Y,1.5,0,7); ctx.fill(); }
    else if(kind==='embers'){ ctx.fillStyle='#ff6a2a'; ctx.fillRect(X,Y,2,3); }
    else if(kind==='runes'){ ctx.strokeStyle='#e8e8ee'; ctx.lineWidth=1; ctx.strokeRect(X,Y,4,6); }
    else if(kind==='banners'){ ctx.fillStyle='#c8677e'; ctx.beginPath(); ctx.moveTo(X,Y); ctx.lineTo(X+5,Y+3); ctx.lineTo(X,Y+8); ctx.closePath(); ctx.fill(); }
  }
  ctx.restore();
}
function paintEyes(g, X, Y, r, style, vx, vy, fin){
  const lx=clamp(vx*0.001,-1.3,1.3), ly=clamp(-vy*0.001,-1.3,1.3);
  const ew=r*0.31, ex=r*0.36, ey=-r*0.26, pr=r*0.15;
  if(style==='cyclops'){
    g.fillStyle='#fff'; g.beginPath(); g.arc(X,Y+ey,r*0.42,0,7); g.fill();
    g.fillStyle='#111'; g.beginPath(); g.arc(X+lx,Y+ey+ly,r*0.2,0,7); g.fill(); return;
  }
  [X-ex, X+ex].forEach(cx=>{
    if(style==='hollow'){ g.strokeStyle='rgba(255,255,255,0.7)'; g.lineWidth=1.3; g.beginPath(); g.arc(cx,Y+ey,ew,0,7); g.stroke(); return; }
    g.fillStyle='#fff'; g.beginPath(); g.arc(cx,Y+ey,ew,0,7); g.fill();
    if(style==='rimmed' && fin && fin.rim){ g.strokeStyle=fin.rim; g.lineWidth=1.1; g.stroke(); }
    g.fillStyle='#111'; g.beginPath(); g.arc(cx+lx,Y+ey+ly,pr,0,7); g.fill();
    if(style==='glint'){ g.fillStyle='rgba(255,255,255,0.9)'; g.beginPath(); g.arc(cx+ew*0.42,Y+ey-ew*0.42,r*0.06+0.5,0,7); g.fill(); }
  });
}
function paintHand(g, X, Y, r, fin, vx, vy){
  if(fin.glow){ g.save(); g.globalAlpha=0.4; g.fillStyle=fin.glow; g.beginPath(); g.arc(X,Y,r*1.65,0,7); g.fill(); g.restore(); }
  if(fin.body2){
    const grd=g.createRadialGradient(X-r*0.35,Y-r*0.42,r*0.15, X,Y,r*1.05);
    if(fin.metal){ grd.addColorStop(0,'#ffffff'); grd.addColorStop(0.55,fin.body); grd.addColorStop(1,fin.body2); }
    else { grd.addColorStop(0,fin.body); grd.addColorStop(1,fin.body2); }
    g.fillStyle=grd;
  } else { g.fillStyle=fin.body; }
  g.beginPath(); g.arc(X,Y,r,0,7); g.fill();
  if(fin.rim){ g.strokeStyle=fin.rim; g.lineWidth=Math.max(1,r*0.09); g.beginPath(); g.arc(X,Y,r,0,7); g.stroke(); }
  g.save(); g.globalAlpha=0.30; g.fillStyle='#fff'; g.beginPath(); g.arc(X-r*0.34,Y-r*0.36,r*0.24,0,7); g.fill(); g.restore();
  paintEyes(g, X, Y, r, fin.eye, vx||0, vy||0, fin);
}
function drawHand(){
  const X=sx(HAND.x), Y=sy(HAND.y);
  ctx.save();
  // reach ring (always visible)
  if(HAND.mode==='fly'){
    ctx.strokeStyle = whiffLock>0 ? 'rgba(226,75,74,.55)' : (grabWin>0 ? 'rgba(232,232,238,.45)' : 'rgba(232,232,238,.10)');
    ctx.lineWidth = grabWin>0 ? 2.5 : 1.5;
    ctx.beginPath(); ctx.arc(X,Y,REACH*S,0,7); ctx.stroke();
    const t = nearestStud(HAND.x,HAND.y,REACH);
    if(t){ const TX=sx(t.x),TY=sy(t.y);
      ctx.strokeStyle='rgba(231,192,75,.9)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(TX,TY,13*S,0,7); ctx.stroke(); }
  }
  // tether when attached
  if(HAND.mode==='attach' && HAND.anchor){
    const AX=sx(HAND.anchor.x),AY=sy(HAND.anchor.y);
    ctx.strokeStyle= HAND.charge>0.66?'#e7c04b':'rgba(232,232,238,.5)';
    ctx.lineWidth = 1.5 + HAND.charge*2.5;
    ctx.beginPath(); ctx.moveTo(AX,AY); ctx.lineTo(X,Y); ctx.stroke();
    if(HAND.wraps>WRAP_CAP-0.5){ // tremble warning
      ctx.strokeStyle='rgba(231,110,75,.8)'; ctx.beginPath();
      ctx.arc(AX,AY,HAND.r*S,0,7); ctx.stroke();
    }
  }
  // launch-direction tick while winding: watch it swing; it turns gold in the clean window
  if(HAND.mode==='attach' && held && HAND.charge>0.05){
    const sd = clamp(Math.cos(HAND.ang),-1,1);
    let ddx=sd*AIM_BEND, ddy=1.0; const inv2=1/Math.hypot(ddx,ddy);
    ctx.strokeStyle = Math.abs(sd)<0.19 ? '#e7c04b' : 'rgba(232,232,238,.4)';
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(X,Y); ctx.lineTo(X+ddx*inv2*36*S, Y-ddy*inv2*36*S); ctx.stroke();
  }

  // finish trail
  const fin = FINISHES[skin] || FINISHES.factory;
  if(fin.trail && trail.length){
    const col = fin.trailCol || fin.body;
    trail.forEach((tp,i)=>{
      const a=(i+1)/trail.length; let rr=3.4, rise=0;
      if(fin.trail==='after'){ rr = 9*S*a; }
      else if(fin.trail==='fire'){ rr = 2.5+a*3.2; rise=(1-a)*12; }
      else if(fin.trail==='sparkle'){ rr = ((i+(simFrame>>1))%3===0)?3:1.3; }
      else if(fin.trail==='stars'){ rr=1.6; }
      ctx.globalAlpha = a*(fin.trail==='after'?0.3:0.5); ctx.fillStyle=col;
      ctx.beginPath(); ctx.arc(sx(tp.x), sy(tp.y)-rise, rr, 0, 7); ctx.fill();
    });
    ctx.globalAlpha=1;
  }
  // the sticky hand, wearing its finish
  paintHand(ctx, X, Y, 11*S, fin, HAND.vx, HAND.vy);
  // the eye you carry — Moose's, kept since the day the claw took him
  if(mode==='play'){
    const ex=X+11*S*0.66, ey=Y+11*S*0.62;
    ctx.fillStyle='#f2efe6'; ctx.beginPath(); ctx.arc(ex,ey,3.1,0,7); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.3)'; ctx.lineWidth=0.8; ctx.stroke();
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(ex+0.5,ey+0.4,1.35,0,7); ctx.fill();
  }
  // charge as a warming rim — finish stays visible the whole wind
  if(HAND.mode==='attach' && HAND.charge>0.02){
    const c2=HAND.charge;
    ctx.strokeStyle = c2>0.7 ? '#e7c04b' : `rgba(240,${180-c2*70|0},${120-c2*50|0},${0.45+c2*0.55})`;
    ctx.lineWidth = 1.5 + c2*3;
    ctx.beginPath(); ctx.arc(X,Y,11*S+2+c2*2,0,7); ctx.stroke();
  }
  if(dusty && !HAND._wiped){ ctx.fillStyle='rgba(200,190,150,.25)'; ctx.beginPath(); ctx.arc(X,Y,12*S,0,7); ctx.fill(); }
  ctx.restore();
}
function drawClaw(){
  if(!CLAW) return;
  const open = clawT > (CLAW_PERIOD-CLAW_OPEN);
  const X=sx(CLAW.x), Y=sy(CLAW.y), w=CLAW.w*S;
  if(Y<-40||Y>Hc+40) return;
  ctx.save(); ctx.strokeStyle= open?'#5a5e6b':'#c6cad8'; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(X-w/2,Y-16); ctx.lineTo(X,Y); ctx.lineTo(X+w/2,Y-16);
  const spread = open? 16:5;
  ctx.moveTo(X,Y); ctx.lineTo(X-spread,Y+16);
  ctx.moveTo(X,Y); ctx.lineTo(X+spread,Y+16); ctx.stroke();
  ctx.restore();
}

function render(){
  ctx.clearRect(0,0,Wc,Hc);
  // machine interior — zone- and theme-aware
  const bgz = themeBG();
  const g=ctx.createLinearGradient(0,0,0,Hc); g.addColorStop(0,bgz.top); g.addColorStop(1,bgz.bottom);
  ctx.fillStyle=g; ctx.fillRect(0,0,Wc,Hc);
  drawMotif(bgz.motif);

  // faint zone bands + labels
  for(const z of ZONES){
    const y = sy(PIT_Y + TOWER_H*(z.top/100));
    if(y>-20&&y<Hc+20){ ctx.strokeStyle='rgba(255,255,255,.04)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(Wc,y); ctx.stroke(); }
  }
  ctx.font='600 8px ui-monospace,monospace'; ctx.textAlign='left';
  for(const cv2 of CARVINGS){ const cy2=sy(PIT_Y+TOWER_H*cv2.pct/100);
    if(cy2>-8&&cy2<Hc+8){
      const fade=Math.max(0.055, 0.17 - cv2.pct/100*0.10);   // higher = older = fainter
      ctx.fillStyle='rgba(196,190,172,'+fade.toFixed(3)+')';
      let X=sx(cv2.x); const w=ctx.measureText(cv2.t).width;
      if(X+w>Wc-6) X=Math.max(6, Wc-6-w);
      ctx.fillText(cv2.t, X, cy2);
    } }

  const zc = zoneAt(pctOf(HAND.y));
  ctx.fillStyle='rgba(180,183,200,.18)'; ctx.font=`600 ${Math.round(11)}px ui-monospace,monospace`;
  ctx.textAlign='left'; ctx.fillText(zc.name.toUpperCase(), 12, Hc-16);

  drawClaw();
  for(const s of STUDS) drawStud(s);
  for(const t of TOKENS){
    if(t.got) continue;
    const X=sx(t.x), Y=sy(t.y);
    if(Y<-20||Y>Hc+20) continue;
    ctx.fillStyle='#e7c04b'; ctx.beginPath(); ctx.arc(X,Y,5.5,0,7); ctx.fill();
    ctx.strokeStyle='#85510b'; ctx.lineWidth=1.5; ctx.stroke();
  }
  pickups = pickups.filter(pk=>simFrame-pk.f<50);
  for(const pk of pickups){
    const a=1-(simFrame-pk.f)/50;
    ctx.globalAlpha=Math.max(0,a); ctx.fillStyle='#e7c04b'; ctx.font='700 13px ui-monospace,monospace'; ctx.textAlign='center';
    ctx.fillText('+'+pk.v+'¢', sx(pk.x), sy(pk.y)-(1-a)*26); ctx.globalAlpha=1;
  }
  // grab-impact ring, tinted to the worn finish
  bursts = bursts.filter(b=>simFrame-b.f<16);
  for(const b of bursts){
    const a=(simFrame-b.f)/16;
    ctx.globalAlpha=(1-a)*0.85; ctx.strokeStyle=b.col; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(sx(b.x), sy(b.y), (5+a*20)*S, 0, 7); ctx.stroke(); ctx.globalAlpha=1;
  }

  // dotted "should-have-released" receipt while a fall screen is up
  if((mode==='fall') && currentFall && HAND.lastAnchor){
    const a=HAND.lastAnchor; const up = nearestStud(a.x, a.y+260, 320);
    if(up){ ctx.strokeStyle='rgba(231,192,75,.55)'; ctx.lineWidth=2; ctx.setLineDash([5,7]);
      ctx.beginPath(); ctx.moveTo(sx(a.x),sy(a.y)); ctx.lineTo(sx(up.x),sy(up.y)); ctx.stroke(); ctx.setLineDash([]); }
  }

  // appeal ghost playback
  if(mode==='appeal_watch' && ghost){
    ctx.strokeStyle='rgba(231,110,75,.5)'; ctx.lineWidth=2; ctx.beginPath();
    for(let i=0;i<=ghost.i && i<ghost.pts.length;i++){ const p=ghost.pts[i];
      const X=sx(p.x),Y=sy(p.y); i===0?ctx.moveTo(X,Y):ctx.lineTo(X,Y); }
    ctx.stroke();
    const p=ghost.pts[Math.min(ghost.i,ghost.pts.length-1)];
    if(p){ ctx.fillStyle='#e85c3c'; ctx.beginPath(); ctx.arc(sx(p.x),sy(p.y),11*S,0,7); ctx.fill();
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(sx(p.x)-4,sy(p.y)-3,3,0,7); ctx.arc(sx(p.x)+4,sy(p.y)-3,3,0,7); ctx.fill(); }
  } else {
    drawHand();
  }

  // flash
  if(flash>0){ ctx.fillStyle=`rgba(255,255,255,${flash*0.5})`; ctx.fillRect(0,0,Wc,Hc); }

  // HUD: giant % (reads across a room)
  const showPct = mode==='appeal_watch'? (ghost?ghost.pct:0) : Math.round(pctOf(HAND.y));
  ctx.textAlign='right'; ctx.fillStyle='rgba(232,232,238,.92)';
  ctx.font=`700 ${Math.round(40)}px ui-monospace,monospace`;
  ctx.fillText(showPct+'%', Wc-14, 52);
  ctx.font=`600 ${Math.round(10)}px ui-monospace,monospace`; ctx.fillStyle='rgba(232,232,238,.4)';
  ctx.fillText('BEST '+Math.round(bestPct)+'%', Wc-14, 68);

  // the loss, live: watch your progress drain while you fall
  if(fallTrack && HAND.mode==='fly' && mode==='play'){
    const d = pctOf(HAND.peakY)-pctOf(HAND.y);
    if(d>1.5){ ctx.fillStyle='#e24b4a';
      ctx.font=`700 ${Math.min(34, Math.round(13+d*0.55))}px ui-monospace,monospace`;
      ctx.fillText('−'+Math.floor(d)+'%', Wc-14, 98); }
  }
  // return-migration clock (only shown once you've cleared the tower once)
  if(beaten && runStart!==null && mode==='play' && pctOf(HAND.y)>=2){
    ctx.fillStyle='rgba(231,192,75,.75)'; ctx.font='600 12px ui-monospace,monospace'; ctx.textAlign='left';
    ctx.fillText('RM '+fmtT((simFrame-runStart)/120), 12, 52); ctx.textAlign='right';
  }
  // the quarter count
  if(quarters>0 || finishes.length || bgOwned.length || studOwned.length){
    ctx.fillStyle='rgba(231,192,75,.85)'; ctx.font='700 13px ui-monospace,monospace'; ctx.textAlign='left';
    ctx.fillText('¢ '+quarters, 12, 76); ctx.textAlign='right';
  }

  // charge pip
  if(HAND.mode==='attach' && HAND.charge>0.02){
    const bw=Math.min(Wc-24,120), bx=(Wc-bw)/2, by=Hc-40;
    ctx.fillStyle='rgba(255,255,255,.1)'; ctx.fillRect(bx,by,bw,5);
    ctx.fillStyle= HAND.charge>0.9?'#e76e4b':'#e7c04b'; ctx.fillRect(bx,by,bw*HAND.charge,5);
  }

  // one-line onboarding: visible until the first fling, then gone forever this session
  if(!hasFlung && mode==='play'){
    ctx.textAlign='center'; ctx.fillStyle='rgba(232,232,238,.7)';
    ctx.font='600 13px ui-monospace,monospace';
    ctx.fillText('HOLD to wind · LET GO to fly · TAP mid-air to grab', Wc/2, Hc*0.8);
  }
  // the pit remembers him — quiet chorus while you rest at the bottom
  else if(mode==='play' && HAND.mode==='attach' && pctOf(HAND.y)<3.5){
    const c=PIT_CHORUS[Math.floor(simFrame/(120*6))%PIT_CHORUS.length];
    ctx.textAlign='center'; ctx.font='500 10.5px ui-monospace,monospace';
    const lines=wrapLines(ctx, '“'+c.t+'”', Wc-46);
    const baseY=Hc-34-lines.length*13;
    ctx.fillStyle='rgba(202,205,218,.5)';
    lines.forEach((ln,i)=>ctx.fillText(ln, Wc/2, baseY+i*13));
    ctx.fillStyle='rgba(202,205,218,.34)'; ctx.font='600 8px ui-monospace,monospace';
    ctx.fillText('— '+c.who, Wc/2, baseY+lines.length*13+2);
  }

  // boss / clutch line
  if(bossLineT>0){ ctx.textAlign='center'; ctx.globalAlpha=Math.min(1,bossLineT);
    ctx.fillStyle='#e7c04b'; ctx.font=`700 ${Math.round(bossBig?26:14)}px ui-monospace,monospace`;
    ctx.fillText(bossLine, Wc/2, Hc*0.4); ctx.globalAlpha=1; }

  // the climb narrates itself: a beat that lands as you cross into a new zone
  if(reveal){
    const a = reveal.t<0.35 ? reveal.t/0.35 : (reveal.t>3.9 ? Math.max(0,(4.6-reveal.t)/0.7) : 1);
    ctx.save(); ctx.textAlign='center'; ctx.globalAlpha=a;
    const cy=Hc*0.24;
    ctx.fillStyle='rgba(231,192,75,.9)'; ctx.font='600 10px ui-monospace,monospace';
    ctx.fillText(reveal.title.toUpperCase(), Wc/2, cy);
    ctx.fillStyle='rgba(242,240,246,.98)'; ctx.font='500 16px ui-monospace,monospace';
    const lines=wrapLines(ctx, reveal.lede, Wc-52);
    lines.forEach((ln,i)=>ctx.fillText(ln, Wc/2, cy+22+i*22));
    ctx.globalAlpha=1; ctx.restore();
  }

  // takeover prompt
  if(mode==='appeal_play' && takeover){ ctx.textAlign='center'; ctx.fillStyle='rgba(232,232,238,.9)';
    ctx.font=`700 14px ui-monospace,monospace`; ctx.fillText('SAVE IT.', Wc/2, 96);
    ctx.font=`600 11px ui-monospace,monospace`; ctx.fillStyle='rgba(232,232,238,.5)';
    ctx.fillText('one grab · press at the instant · attempt '+(takeover.attempts+1), Wc/2, 114); }
}

/* ============================================================ MAIN LOOP */
let last=performance.now()/1000, acc=0, frozen=false;
function frame(t){
  requestAnimationFrame(frame);
  const now=t/1000; let real=now-last; last=now; if(real>0.2) real=0.2;
  if(frozen){ render(); return; }
  acc+=real;
  while(acc>=DT){
    // timers (real time)
    if(hitstop>0) hitstop-=DT;
    if(slowmo>0) slowmo-=DT;
    if(flash>0) flash=Math.max(0,flash-DT*4);
    if(bossLineT>0) bossLineT-=DT;
    if(reveal){ reveal.t+=DT; if(reveal.t>4.6) reveal=null; }
    const active = (mode==='play'||mode==='appeal_play');
    if(active && hitstop<=0){
      const scale = slowmo>0?0.4:1;
      if(mode==='appeal_play') stepTakeover(DT*scale);
      else step(DT*scale);
    } else if(mode==='appeal_watch'){
      advanceGhost(DT);
    }
    acc-=DT;
  }
  render();
}

  g.beginPath();

  else if(shape==='square'){ g.rect(X-r*0.85, Y-r*0.85, r*1.7, r*1.7); }
  else if(shape==='bolt'){ g.moveTo(X,Y-r); g.lineTo(X+r*0.9,Y+r*0.5); g.lineTo(X-r*0.9,Y+r*0.5); g.closePath(); }
  else { g.arc(X,Y,r,0,7); }
}

function renderShareCard(f){

  x.strokeStyle='#b9b4a4'; x.setLineDash([6,8]); x.beginPath(); x.moveTo(40,130); x.lineTo(560,130); x.stroke(); x.setLineDash([]);
  x.font='700 40px ui-monospace,monospace'; x.fillText('FALL №'+(f.no||'?')+' — '+f.name, 40, 190);
  x.fillStyle='#a3231f'; x.font='700 64px ui-monospace,monospace'; x.fillText(f.fromPct+'% → '+f.toPct+'%', 40, 268);
  // mini fall diagram
  x.fillStyle='#14140f'; x.font='600 15px ui-monospace,monospace';
  x.fillText('charge on record: '+f.wraps+' wrap'+(f.wraps===1?'':'s')+'   ·   fell from '+f.fromPct+'%', 40, 320);
  // trajectory sketch
  const bx=40,by=360,bw=520,bh=250;
  x.strokeStyle='#d8d3c4'; x.strokeRect(bx,by,bw,bh);
  if(f.pts&&f.pts.length){
    let minX=1e9,maxX=-1e9,minY=1e9,maxY=-1e9;
    f.pts.forEach(p=>{minX=Math.min(minX,p.x);maxX=Math.max(maxX,p.x);minY=Math.min(minY,p.y);maxY=Math.max(maxY,p.y);});
    const sxx=v=>bx+20+((v-minX)/((maxX-minX)||1))*(bw-40);
    const syy=v=>by+20+(1-(v-minY)/((maxY-minY)||1))*(bh-40);
    x.strokeStyle='#a3231f'; x.lineWidth=3; x.beginPath();
    f.pts.forEach((p,i)=>{ i?x.lineTo(sxx(p.x),syy(p.y)):x.moveTo(sxx(p.x),syy(p.y)); }); x.stroke();
    const last=f.pts[f.pts.length-1]; x.fillStyle='#a3231f'; x.beginPath(); x.arc(sxx(last.x),syy(last.y),7,0,7); x.fill();
  }
  x.fillStyle='#5b584c'; x.font='600 14px ui-monospace,monospace';
  x.fillText('TIME OBSERVED ........ not released', 40, 660);
  x.fillStyle='#14140f'; x.font='700 22px ui-monospace,monospace';
  x.fillText('catch the grab '+myHandle+' missed.', 40, 710);
  return c.toDataURL('image/png');
}

function b64urlDecode(str){
  str = str.replace(/-/g,'+').replace(/_/g,'/'); while(str.length%4)str+='=';
  return JSON.parse(decodeURIComponent(escape(atob(str))));
}
function buildAppealLink(f){
  // quantize trajectory to keep it ~1KB
  const pts = f.pts.map(p=>[p.x|0, p.y|0]);
  const s0 = f.s0 || {x:HAND.x,y:HAND.y,vx:0,vy:-400};
  const payload = { v:1, k:'A', from:myHandle, sn:SEASON.id,
    f:{n:'FALL №'+(f.no||'?')+' — '+f.name, p:f.pct, a:f.fromPct, b:f.toPct, w:f.wraps},
    t:pts, s0:[Math.round(s0.x),Math.round(s0.y),Math.round(s0.vx),Math.round(s0.vy)],
    L: ledger || {vs:null, c:0, g:0, d:0, dmg:0} };
  const base = location.origin + location.pathname;
  return base + '#a=' + b64urlEncode(payload);
}
function buildVerdictLink(v){
  const payload = { v:1, k:'V', from:myHandle, to:incoming.from, sn:SEASON.id,
    verdict:v.kind, n:v.attempts, pct:Math.round(bestPct),
    orig:incoming.f, L:v.ledger };
  const base = location.origin + location.pathname;
  return base + '#a=' + b64urlEncode(payload);
}

/* ---------- parse an incoming link on load ---------- */
function parseIncoming(){
  const m = location.hash.match(/[#&]a=([^&]+)/);
  if(!m) return null;
  try{ return b64urlDecode(m[1]); }catch(e){ return null; }
}

/* ============================================================ APPEAL RECEIVER FLOW */
function startAppeal(pl){
  incoming = pl;
  if(pl.k==='V'){ showReceivedVerdict(pl); return; }
  // ghost playback data
  ghost = { pts: pl.t.map(p=>({x:p[0],y:p[1]})), i:0, pct:pl.f.a, done:false };
  el('b_archive').style.display='none'; el('b_foyer').style.display='none';
  el('ai_kick').textContent = pl.self ? 'your own last second' : (pl.archive ? 'the fall nothing has caught' : 'a hand, called');
  const kickLine = pl.self ? 'YOUR FALL, AGAIN' : (pl.archive ? 'THE ELDER · nobody has ever caught this one' : esc(pl.from)+' CALLED YOUR HAND');
  const subLine = pl.self ? 'You were there. You are about to be there again.'
    : (pl.archive ? 'Nothing has ever caught this fall. Your hand. One shot.' : esc(pl.from)+" reached for the grab and missed. Now it's your hand.");
  el('ai_doc').innerHTML =
    `<div class="kick" style="color:#8a2b1f;letter-spacing:.18em;font-size:11px;margin-bottom:6px">${kickLine}</div>`+
    `<h1>${esc(pl.from)} FELL<br>FROM ${pl.f.a}%<br><span class="dmg">${esc(pl.f.n)} · −${pl.f.p}%</span></h1>`+
    `<div class="sub">${subLine}</div>`+
    `<div class="sub" style="margin-top:6px;">One hand. One shot. Was the grab there, or not?</div>`+
    `<div class="rule"></div><div class="sub big">your hand now.</div>`;
  el('p_appeal_intro').classList.add('on');
  mode='appeal_intro';
  // center camera on the fall
  if(ghost.pts.length){ camY = ghost.pts[0].y; }
}
el('b_watch').onclick=()=>{ el('p_appeal_intro').classList.remove('on'); mode='appeal_watch';
  ghost.i=0; ghost.acc=0; };

function advanceGhost(dt){
  if(!ghost) return;
  ghost.acc=(ghost.acc||0)+dt;
  if(ghost.acc>0.045){ ghost.acc=0; ghost.i++; }
  if(ghost.pts[ghost.i]) camY += (ghost.pts[ghost.i].y+40 - camY)*Math.min(1,dt*6);
  if(ghost.i>=ghost.pts.length-1 && !ghost.done){ ghost.done=true; setTimeout(beginTakeover, 500); }
}

function beginTakeover(){
  mode='appeal_play';
  const s0 = incoming.s0;
  HAND.mode='fly'; HAND.x=s0[0]; HAND.y=s0[1]; HAND.vx=s0[2]; HAND.vy=s0[3];
  HAND.peakY = HAND.y + 500;
  takeover = { attempts:0, failY: HAND.y - 620, saved:false, s0:s0.slice(), window:0 };
  held=false; grabWin=0; whiffLock=0;
  bossFlash('YOUR HAND NOW. CATCH IT.');
  const gv=el('b_giveup'); gv.style.display='block';
  gv.onclick=()=>{ gv.style.display='none'; resolveVerdict('DENIED'); };
}
function toReset(msg){
  takeover.attempts++; takeover.window=0;
  const s0=takeover.s0; HAND.x=s0[0];HAND.y=s0[1];HAND.vx=s0[2];HAND.vy=s0[3];
  flash=0.6; if(msg) bossFlash(msg);
}
function stepTakeover(dt){
  simFrame++;
  // ONE grab: the window opens on press and lasts ~160ms; miss = attempt spent
  if(takeover.window>0 && !takeover.saved){
    takeover.window -= dt;
    const s=nearestStud(HAND.x,HAND.y,REACH);
    if(s){ attachTo(s,HAND.vx,HAND.vy); slowmo=0.45; bossFlash('CAUGHT.', true);
      takeover.saved=true; takeover.window=0; setTimeout(()=>resolveVerdict('GRANTED'), 700); return; }
    if(takeover.window<=0){ toReset('the grab met nothing.'); return; }
  }
  if(takeover.saved) return;                        // caught: hold the frame for the verdict
  HAND.vy-=G*dt; HAND.x+=HAND.vx*dt; HAND.y+=HAND.vy*dt;
  if(HAND.x<28){HAND.x=28;HAND.vx*=-0.5;} if(HAND.x>VW-28){HAND.x=VW-28;HAND.vx*=-0.5;}
  camY += (HAND.y+60 - camY)*Math.min(1,dt*7);
  // fell past the footage → reset to the same doomed instant, count the attempt
  if(HAND.y < takeover.failY && !takeover.saved){ toReset(null); }
}

/* ---------- verdict engine + ledger ---------- */
function resolveVerdict(kind){
  mode='verdict';
  el('b_giveup').style.display='none';
  const att = takeover.attempts;
  // update head-to-head ledger (rides inside links)
  const L = incoming.L || {vs:null, c:0, g:0, d:0, dmg:0};
  const newL = { vs:incoming.from, c:(L.c||0)+1, g:(L.g||0)+(kind==='GRANTED'?1:0),
    d:(L.d||0)+(kind==='DENIED'?1:0), dmg:(L.dmg||0)+ (incoming.f? incoming.f.p:0) };
  let title, body, klass;
  if(incoming.self){
    if(kind==='DENIED'){
      title='THE FALL STANDS.'; klass='dmg';
      body=`you have now declined it twice. the footage is patient.`;
    } else {
      title=`FALL №${incoming.no} — OVERTURNED.${att===0?'<br>FIRST ATTEMPT.':''}`; klass='ok';
      body=`survivable after all. it was you both times.<br><br>the record has been amended. the fall keeps its name; you keep the last word.`;
      const e=fallLog.find(f=>f.no===incoming.no); if(e){ e.saved=true; e.att=att+1; } save();
    }
  } else if(incoming.archive){
    if(kind!=='DENIED'){ const cur=archStatus[incoming.caseId];
      if(!cur || !cur.saved || att+1<cur.att){ archStatus[incoming.caseId]={saved:true, att:att+1}; } save(); }
    if(kind==='DENIED'){
      title='RECONSTRUCTION ABANDONED.<br>THE FALL STANDS.'; klass='dmg';
      body=`the archive expected nothing less.<br><br>${esc(incoming.from)} can wait. ${esc(incoming.from)} has been waiting since Season 1.`;
    } else {
      title=`${esc(incoming.from)}'S FALL:<br>SURVIVED.${att===0?'<br>FIRST ATTEMPT.':''}`; klass='ok';
      body=`nothing had ever survived this footage.<br><br>the archive has been corrected. it will not apologize. attempt count on record: ${att+1}.`;
    }
  } else if(kind==='DENIED'){
    title='NO HAND COULD\'VE.'; klass='dmg';
    body=`${att+1} tr${att===0?'y':'ies'}, and nobody reaches that. the claw just had ${esc(incoming.from)}.<br><br>${esc(incoming.from)} is cleared. it wasn't their grip — it was the machine.`;
  } else if(att===0){
    title='CAUGHT IT.<br>FIRST TRY.'; klass='ok';
    body=`the grab was right there the whole time. ${esc(incoming.from)} just missed it.<br><br>it's on the record now:<br><b>${esc(incoming.f.n)}: −${incoming.f.p}% (${esc(myHandle)} caught it in one)</b>`;
  } else {
    title=`CAUGHT IT.<br>try ${att+1}.`; klass='ok';
    body=`reachable — proven. easy — the ${att} miss${att===1?'':'es'} before it beg to differ.`;
  }
  el('verdict_doc').innerHTML =
    `<h1 class="${klass}">${title}</h1><div class="rule"></div><div class="sub">${body}</div>`+
    (incoming.archive||incoming.self ? '' :
      `<div class="rule"></div><div class="ledger"><span>${esc(myHandle)} v ${esc(incoming.from)}</span>`+
      `<span>${newL.c} call${newL.c===1?'':'s'}</span><span class="ok">${newL.g} caught</span><span class="dmg">${newL.d} unreachable</span></div>`);
  el('p_verdict').classList.add('on');
  if(incoming.archive || incoming.self){
    el('b_reply').style.display='none';
  } else {
    el('b_reply').style.display='';
    const vlink = buildVerdictLink({kind, attempts:att, ledger:newL});
    el('b_reply').onclick = ()=>doShare(vlink, 'verdict');
  }
  el('b_climb').onclick = ()=>enterOwnTower();
}

/* the on-ramp: after judging, the cold receiver is DEPOSITED into their own tower */
function enterOwnTower(){
  el('p_verdict').classList.remove('on');
  incoming=null; ghost=null; takeover=null;
  history.replaceState(null,'',location.pathname);   // clear the footage from the URL
  resetToPit();
  mode='play';
  el('b_archive').style.display='block'; el('b_foyer').style.display='block';
}
function showReceivedVerdict(pl){
  // the sender opening the classification they got back
  const win = pl.verdict==='GRANTED';
  el('verdict_doc').innerHTML =
    `<div class="kick" style="letter-spacing:.18em;font-size:11px;color:#8a2b1f;margin-bottom:6px">RE: ${esc(pl.orig?pl.orig.n:'your footage')}</div>`+
    `<h1 class="${win?'dmg':'ok'}">${win?'THEY CAUGHT IT.':'NO HAND COULD.'}</h1>`+
    `<div class="rule"></div><div class="sub">${win?`${esc(pl.from)} caught the grab you missed, on try ${(pl.n||0)+1}. it was reachable the whole time. that one's on you.`:`${esc(pl.from)} reached for it and missed too. the claw had you. you're cleared — nobody was catching that.`}</div>`;
  el('p_verdict').classList.add('on');
  el('b_reply').style.display='';
  el('b_reply').textContent='CALL ANOTHER HAND'; el('b_reply').onclick=()=>enterOwnTower();
  el('b_climb').onclick=()=>enterOwnTower();
  mode='verdict';
}

/* ---------- reset ---------- */
function resetToPit(){
  zonesThisRun=[]; foundThisRun=false;
  const pit = STUDS.find(s=>s.perch) || STUDS.find(s=>s.pit);
  HAND.peakY = pit.y; HAND.lastAnchor=null; HAND.lastWraps=0;
  attachTo(pit,0,0); held=false; HAND.charge=0; hitstop=0; slowmo=0;
  camY = HAND.y+60;
}

/* ============================================================ BOOT */
function boot(){
  resize(); buildTower(); load();
  bossLine = FIELD_NOTES[(Date.now()>>10)%FIELD_NOTES.length];
  el('b_archive').onclick = ()=>openRecord();
  el('b_foyer').onclick = ()=>openFoyer();
  updateFoyerBadge();
  const inc = parseIncoming();
  if(inc){ resetToPit(); startAppeal(inc); }
  else {
    // land on the nearest pit stud, already gripping, dusty if returning
    resetToPit();
    if(dusty){ setTimeout(()=>{ HAND._wiped=true; }, 900); }
    mode='play';
    el('b_archive').style.display='block'; el('b_foyer').style.display='block';
  }
  requestAnimationFrame(frame);
}

/* one fixed-step of the sim, mirroring the main loop body (for headless driving) */
function tickOnce(){
  if(hitstop>0) hitstop-=DT;
  if(slowmo>0) slowmo-=DT;
  if(flash>0) flash=Math.max(0,flash-DT*4);
  if(bossLineT>0) bossLineT-=DT;
  if(reveal){ reveal.t+=DT; if(reveal.t>4.6) reveal=null; }
  const active = (mode==='play'||mode==='appeal_play');
  if(active && hitstop<=0){ const scale=slowmo>0?0.4:1;
    if(mode==='appeal_play') stepTakeover(DT*scale); else step(DT*scale); }
  else if(mode==='appeal_watch'){ advanceGhost(DT); }
}

/* debug hooks (like his other games: __bfe etc.) */
window.__thwap = {
  goto:(pct)=>{ const y=PIT_Y+TOWER_H*pct/100; const s=nearestStud(CX,y,600)||{x:CX,y,type:'plastic'};
    HAND.x=s.x;HAND.y=s.y;HAND.peakY=s.y; attachTo(s,0,0); camY=s.y+60; },
  fall:()=>{ HAND.mode='fly'; HAND.vx=120; HAND.vy=-1500; fallTrack=null; },
  press:()=>down(), release:()=>up(),
  tick:(n=1)=>{ for(let i=0;i<n;i++) tickOnce(); return window.__thwap.state(); },
  paint:()=>{ render(); return true; },        // force a frame while headless
  studs:()=>STUDS.length,
  towerSig:()=>STUDS.map(s=>Math.round(s.x)+':'+Math.round(s.y)+s.type[0]).join('|').length,
  ys:()=>STUDS.filter(grippable).map(s=>Math.round(s.y)).sort((a,b)=>a-b),
  // for each grippable stud, is there another grippable stud reachable above it?
  climbAudit:()=>{ const g=STUDS.filter(grippable).slice().sort((a,b)=>a.y-b.y);
    const APEX=397, RE=REACH; let worst=null, wallY=null;
    for(const s of g){ if(s.y>TOP_Y-260) continue;
      // best reachable higher stud: within horizontal span and vertical <= apex+reach
      let best=1e9;
      for(const t of g){ const dy=t.y-s.y; if(dy<40) continue;
        const dx=Math.abs(t.x-s.x); if(dx>240) continue;
        const need=dy - RE; if(need<best) best=need; }
      if(best>APEX){ if(!worst||best>worst){worst=best; wallY=Math.round(s.y);} } }
    return {climbable: worst===null, hardestNeed:worst, wallY, apexBudget:APEX+RE}; },
  consts:()=>({REACH, apex:Math.round(LAUNCH_MAX*0.88*LAUNCH_MAX*0.88/(2*G))}),
  handle:(h)=>{ myHandle=h; save(); },
  link:()=>window.__lastLink,
  makeAppeal:()=>{ // build a fake named fall and its footage link (round-trip test)
    currentFall={zone:ZONES[2],no:7,name:'THE OPTIMIST',pct:61,fromPct:54,toPct:12,wraps:3,ceremony:true,
      pts:[[210,3200],[190,3000],[240,2600],[160,2100],[200,1700]].map(p=>({x:p[0],y:p[1]})),
      s0:{x:200,y:2000,vx:120,vy:-900},line:FINDINGS.manual[0]};
    return buildAppealLink(currentFall); },
  caseStart:(id)=>{ resetToPit(); startAppeal(casePayload(CASES.find(c=>c.id===id)||CASES[0])); return 'case '+id; },
  freeze:(v)=>{ frozen=!!v; return frozen; },
  grantQ:(n)=>{ quarters+=n; save(); return quarters; },
  story:()=>({zones:zonesReached.slice(), chapters:Object.keys(STORY.chapters), read:chaptersRead.slice()}),
  foyer:()=>({quarters, finishes:finishes.slice(), skin, bgWorn, studWorn, bgOwned:bgOwned.slice(), studOwned:studOwned.slice(), tokenCount:TOKENS.length}),
  tokens:()=>TOKENS.map(t=>[Math.round(t.x),Math.round(t.y),t.v,t.got?1:0]),
  tp:(x,y)=>{ HAND.mode='fly'; HAND.x=x; HAND.y=y; HAND.vx=0; HAND.vy=-160; HAND.peakY=y; camY=y+60; },
  grippableStuds:()=>STUDS.filter(grippable).map(s=>[Math.round(s.x),Math.round(s.y)]),
  motion:(k,m)=>{ recordMotion(k,m); return {guide:guide[k], pending:pendingStamp}; },
  record:()=>JSON.parse(JSON.stringify({guide:guide, fallLog:fallLog, arch:archStatus})),
  parse:(link)=>{ const m=link.match(/[#&]a=([^&]+)/); return m?b64urlDecode(m[1]):null; },
  hand:()=>({mode:HAND.mode,x:Math.round(HAND.x),y:Math.round(HAND.y),vx:Math.round(HAND.vx),vy:Math.round(HAND.vy),
    charge:+HAND.charge.toFixed(2),wraps:+HAND.wraps.toFixed(2),anchor:HAND.anchor?HAND.anchor.type:null,cause:HAND.lastCause||null,
    side:HAND.mode==='attach'?+Math.cos(HAND.ang).toFixed(2):null}),
  state:()=>({mode,pct:+pctOf(HAND.y).toFixed(1),best:+bestPct.toFixed(1),handle:myHandle,frame:simFrame,
    handMode:HAND.mode,attempts:takeover?takeover.attempts:null,
    tw:takeover?+(takeover.window||0).toFixed(3):null, tsaved:takeover?takeover.saved:null,
    ty:takeover?Math.round(HAND.y-takeover.failY):null}),
};

// a link dropped into an already-open tab should also fire the appeal
addEventListener('hashchange', ()=>{
  if(mode==='appeal_intro'||mode==='appeal_watch'||mode==='appeal_play'||mode==='verdict') return;
  const inc = parseIncoming();
  if(inc){ resetToPit(); startAppeal(inc); }
});

boot();
</script>
